  mongos_router:
    image: mongo:latest
    container_name: mongos_router
    restart: always
    depends_on:
      - config1
      - config2
      - config3
    ports:
      - "27016:27017"
    networks:
      - app-network
    command:
      [
        "mongos",
        "--configdb",
        "config_server/config1:27017,config2:27017,config3:27017",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      start_period: 10s

