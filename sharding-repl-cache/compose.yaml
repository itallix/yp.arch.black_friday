services:

  pymongo_api:
    container_name: pymongo_api
    build: 
      context: ../api_app
      dockerfile: Dockerfile
    restart: always
    ports:
      - 8080:8080
    networks:
      app-network:
        ipv4_address: 173.17.0.100
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis1:6379"

  config1:
    image: mongo:latest
    container_name: config1
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.50
    volumes:
      - config1-data:/data/configdb
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      start_period: 10s

  config2:
    image: mongo:latest
    container_name: config2
    restart: always
    ports:
      - "27018:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.51
    volumes:
      - config2-data:/data/configdb
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      start_period: 10s

  config3:
    image: mongo:latest
    container_name: config3
    restart: always
    ports:
      - "27019:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.52
    volumes:
      - config3-data:/data/configdb
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      start_period: 10s

  shard1a:
    image: mongo:latest
    container_name: shard1a
    restart: always
    ports:
      - "27020:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.60
    volumes:
      - shard1a-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      start_period: 10s

  shard1b:
    image: mongo:latest
    container_name: shard1b
    restart: always
    ports:
      - "27021:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.61
    volumes:
      - shard1b-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      start_period: 10s

  shard1c:
    image: mongo:latest
    container_name: shard1c
    restart: always
    ports:
      - "27022:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.62
    volumes:
