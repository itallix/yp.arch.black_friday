  shard2a:
    image: mongo:latest
    container_name: shard2a
    restart: always
    ports:
      - "27023:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.63
    volumes:
      - shard2a-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard2",
