      ]
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      start_period: 10s

  shard2b:
    image: mongo:latest
    container_name: shard2b
    restart: always
    ports:
      - "27024:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.64
    volumes:
      - shard2b-data:/data/db
    command:
      [
        "--shardsvr",
